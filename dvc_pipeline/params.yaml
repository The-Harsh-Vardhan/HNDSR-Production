# =============================================================================
# HNDSR DVC Pipeline � Hyperparameters
# Matched to MLFlow/HNDSR_MLflow.ipynb (v2 bug-fix version)
# =============================================================================

seed: 42

# -- Data ---------------------------------------------------------------------
data:
  hr_dir: "C:\\Users\\harsh\\.cache\\kagglehub\\datasets\\cristobaltudela\\4x-satellite-image-super-resolution\\versions\\1\\HR_0.5m\\HR_0.5m"
  lr_dir: "C:\\Users\\harsh\\.cache\\kagglehub\\datasets\\cristobaltudela\\4x-satellite-image-super-resolution\\versions\\1\\LR_2m\\LR_2m"
  patch_size: 64
  batch_size: 2
  num_workers: 0
  val_split: 0.1          # 90 / 10 train-val split

# -- Checkpoints --------------------------------------------------------------
checkpoints:
  dir: "../checkpoints"   # relative to dvc_pipeline/

# -- Stage 1: Latent Autoencoder ----------------------------------------------
autoencoder:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 50
  latent_dim: 128
  downsample_ratio: 8
  num_res_blocks: 4

# -- Stage 2: Neural Operator (FNO) -------------------------------------------
neural_operator:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 30
  modes: 8
  width: 32

# -- Implicit Amplification (trained jointly with FNO in Stage 2) -------------
implicit_amp:
  hidden_dim: 256

# -- Stage 3: Diffusion UNet --------------------------------------------------
diffusion:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 100
  model_channels: 64
  num_timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02
  num_inference_steps: 50
  grad_clip: 1.0

# -- Evaluation ----------------------------------------------------------------
evaluate:
  num_test_samples: 50
  thresholds:
    min_psnr: 29.0
    min_ssim: 0.85
    max_lpips: 0.20

# -- Visualize (before/after comparison images) --------------------------------
visualize:
  num_samples: 8
  output_dir: "visualize_results"
  diffusion_strength: 0.0
  grid_cols: 4            # columns in the montage grid
  save_individual: true   # also save per-sample comparison strips
