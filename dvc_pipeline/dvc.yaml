# DVC Pipeline � HNDSR Training
# ==============================
# 5-stage DAG:  train_autoencoder -> train_neural_operator -> train_diffusion -> evaluate
#                                                                             -> visualize
#
# Run:   dvc repro          (full pipeline)
#        dvc repro <stage>  (single stage + upstream deps)
#
# Metrics: dvc metrics show
# Params:  dvc params diff
# DAG:     dvc dag

stages:

  # -- Stage 1: Latent Autoencoder ------------------------------------------
  train_autoencoder:
    cmd: python src/train_stage.py --stage autoencoder
    deps:
      - src/dataset.py
      - src/models.py
      - src/utils.py
      - src/train_stage.py
    params:
      - seed
      - data
      - checkpoints
      - autoencoder
    outs:
      - ../checkpoints/autoencoder_best.pth
    metrics:
      - metrics/stage1_metrics.json:
          cache: false

  # -- Stage 2: Neural Operator + Implicit Amplification --------------------
  train_neural_operator:
    cmd: python src/train_stage.py --stage neural_operator
    deps:
      - src/dataset.py
      - src/models.py
      - src/utils.py
      - src/train_stage.py
      - ../checkpoints/autoencoder_best.pth
    params:
      - seed
      - data
      - checkpoints
      - neural_operator
      - implicit_amp
    outs:
      - ../checkpoints/neural_operator_best.pth
    metrics:
      - metrics/stage2_metrics.json:
          cache: false

  # -- Stage 3: Diffusion UNet ---------------------------------------------
  train_diffusion:
    cmd: python src/train_stage.py --stage diffusion
    deps:
      - src/dataset.py
      - src/models.py
      - src/utils.py
      - src/train_stage.py
      - ../checkpoints/autoencoder_best.pth
      - ../checkpoints/neural_operator_best.pth
    params:
      - seed
      - data
      - checkpoints
      - diffusion
    outs:
      - ../checkpoints/diffusion_best.pth
    metrics:
      - metrics/stage3_metrics.json:
          cache: false

  # -- Evaluate -------------------------------------------------------------
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/dataset.py
      - src/models.py
      - src/utils.py
      - src/evaluate.py
      - ../checkpoints/autoencoder_best.pth
      - ../checkpoints/neural_operator_best.pth
      - ../checkpoints/diffusion_best.pth
    params:
      - seed
      - data
      - checkpoints
      - evaluate
    outs:
      - evaluation_results
    metrics:
      - metrics/eval_metrics.json:
          cache: false

  # -- Visualize (before / after comparison grids) ----------------------------
  visualize:
    cmd: python src/visualize.py --params params.yaml
    deps:
      - src/dataset.py
      - src/models.py
      - src/utils.py
      - src/visualize.py
      - ../checkpoints/autoencoder_best.pth
      - ../checkpoints/neural_operator_best.pth
      - ../checkpoints/diffusion_best.pth
    params:
      - seed
      - data
      - checkpoints
      - visualize
    outs:
      - visualize_results
    metrics:
      - metrics/visualize_metrics.json:
          cache: false
